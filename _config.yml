# =============================================================================
# 基本站点信息
# =============================================================================
title: "刘翔的个人主页"
description: "个人学术主页"
url: "https://6LiuXiang9.github.io"
baseurl: ""

# =============================================================================
# 左侧栏个人信息（显示在左上角）
# =============================================================================
author:
  name   : "刘翔"
  avatar : "images/avatar.jpg"   # 把你的照片命名为 avatar.jpg 放到 images/ 目录
  bio    : "来自湖南。"
  location: "Hunan, China"
  employer: "HNFNU"

  # 社交链接（填写你的账号，不需要的注释掉）
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:your@email.com"   # ← 改成你的邮箱
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/6LiuXiang9"
    # - label: "Google Scholar"
    #   icon: "fas fa-fw fa-graduation-cap"
    #   url: "https://scholar.google.com/citations?user=YOURID"
    # - label: "LinkedIn"
    #   icon: "fab fa-fw fa-linkedin"
    #   url: "https://linkedin.com/in/yourprofile"

# =============================================================================
# 导航栏（顶部菜单）
# =============================================================================
# 在 _data/navigation.yml 中配置具体菜单项

# =============================================================================
# Jekyll 构建设置
# =============================================================================
locale           : "zh-CN"
repository       : "6LiuXiang9/6LiuXiang9.github.io"

# 主题
remote_theme     : "academicpages/academicpages.github.io"

# 构建插件
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-gzip

# 排除文件
exclude:
  - "*.sh"
  - "Gemfile"
  - "Gemfile.lock"
  - "README.md"
  - "LICENSE"
  - "CNAME"

# =============================================================================
# 页面默认布局
# =============================================================================
defaults:
  # 所有页面
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true   # ← 这里控制左栏显示

  # 博客文章
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false
